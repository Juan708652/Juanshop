<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - JUANSHOP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            font-family: Arial, sans-serif;
            color: white;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: auto; }
        h1 { color: #00ff88; }
        .nav {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.5);
            padding: 12px 20px;
            border-radius: 50px;
        }
        .nav a {
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 30px;
        }
        .nav a.active, .nav a:hover { background: #00ff88; color: black; }
        table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.5); border-radius: 16px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #00ff88; }
        .status-pending { color: #ffaa00; }
        .btn {
            background: #00ff88;
            color: black;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-danger { background: #ff4444; color: white; }
        .summary { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 12px; flex: 1; text-align: center; }
        .card .value { font-size: 24px; font-weight: bold; color: #00ff88; }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .filter-bar input { flex: 1; padding: 8px; background: rgba(255,255,255,0.1); border: 1px solid #333; border-radius: 8px; color: white; }
        .bulk-actions { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; }
        .checkbox-col { width: 40px; text-align: center; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #00ff88; color: black; padding: 12px 20px; border-radius: 12px; display: none; z-index: 1001; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/">🏠 Home</a>
            <a href="/admin" class="active">📊 Dashboard</a>
            <a href="/logout">🚪 Logout</a>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>JUANSHOP ADMIN</h1>
            <button onclick="fetchOrders()" class="btn">🔄 Refresh</button>
        </div>
        <p>Selamat datang, {{ username }}! 🎉</p>

        <div class="summary" id="summary">
            <div class="card"><div class="value" id="totalOrders">0</div><div>Total Order</div></div>
            <div class="card"><div class="value" id="pendingCount">0</div><div>Pending</div></div>
            <div class="card"><div class="value" id="completedCount">0</div><div>Selesai</div></div>
        </div>

        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="Cari order ID, nama, user ID..." onkeyup="filterTable()">
            <select id="filterStatus" onchange="filterTable()"><option value="all">Semua Status</option><option value="pending">Pending</option><option value="completed">Completed</option></select>
            <select id="filterMetode" onchange="filterTable()"><option value="all">Semua Metode</option><option value="dana">DANA</option><option value="cash">CASH</option></select>
            <button onclick="hapusSemuaCompleted()" class="btn-danger" style="background:#ff4444;">🗑️ Hapus Semua Completed</button>
        </div>

        <div class="bulk-actions">
            <input type="checkbox" id="selectAll" onclick="toggleSelectAll()"> <label for="selectAll">Pilih Semua</label>
            <button onclick="hapusTerpilih()" class="btn-danger" style="background:#ff4444;">🗑️ Hapus Terpilih</button>
        </div>

        <h3>DAFTAR ORDER</h3>
        <div style="overflow-x: auto;">
            <table id="orderTable">
                <thead><tr><th class="checkbox-col">Pilih</th><th>Order ID</th><th>Customer</th><th>User ID</th><th>Produk</th><th>Harga</th><th>Metode</th><th>Status</th><th>Aksi</th></tr></thead>
                <tbody id="tableBody"><tr><td colspan="9" style="text-align:center">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>

    <div id="toastMsg" class="toast"></div>

    <script>
        let ordersData = [];

        async function fetchOrders() {
            try {
                const res = await fetch('/api/admin/get-orders');
                const data = await res.json();
                if(data.success) {
                    ordersData = data.orders;
                    renderTable();
                    updateSummary();
                }
            } catch(e) { console.log(e); }
        }

        function updateSummary() {
            document.getElementById('totalOrders').innerText = ordersData.length;
            document.getElementById('pendingCount').innerText = ordersData.filter(o => o.status === 'pending').length;
            document.getElementById('completedCount').innerText = ordersData.filter(o => o.status === 'completed').length;
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            let filtered = [...ordersData];
            const search = document.getElementById('searchInput').value.toLowerCase();
            if(search) filtered = filtered.filter(o => o.order_id?.toLowerCase().includes(search) || o.customer_name?.toLowerCase().includes(search) || o.customer_id?.toLowerCase().includes(search));
            const status = document.getElementById('filterStatus').value;
            if(status !== 'all') filtered = filtered.filter(o => o.status === status);
            const metode = document.getElementById('filterMetode').value;
            if(metode !== 'all') filtered = filtered.filter(o => o.metode === metode);
            if(filtered.length === 0) { tbody.innerHTML = '<tr><td colspan="9" style="text-align:center">Belum ada order</td></tr>'; return; }
            filtered.forEach(order => {
                const row = tbody.insertRow();
                row.id = `row-${order.order_id}`;
                row.setAttribute('data-status', order.status);
                row.insertCell(0).innerHTML = `<input type="checkbox" class="order-checkbox" value="${order.order_id}">`;
                row.insertCell(1).innerHTML = order.order_id;
                row.insertCell(2).innerHTML = `${order.customer_name || '-'}<br><small>${order.customer_phone || '-'}</small>`;
                row.insertCell(3).innerHTML = order.customer_id;
                row.insertCell(4).innerHTML = order.product_name;
                row.insertCell(5).innerHTML = `Rp ${(order.price || 0).toLocaleString()}`;
                row.insertCell(6).innerHTML = order.metode?.toUpperCase() || '-';
                row.insertCell(7).innerHTML = `<span class="status-${order.status}">${order.status}</span>`;
                const actionCell = row.insertCell(8);
                if(order.status === 'pending') {
                    actionCell.innerHTML = `<button class="btn" onclick="prosesTopup('${order.order_id}', '${order.customer_id}', '${order.product_name}')">🚀 KIRIM</button> <button class="btn-danger" onclick="hapusOrder('${order.order_id}')">🗑️</button>`;
                } else {
                    actionCell.innerHTML = `<button class="btn-danger" onclick="hapusOrder('${order.order_id}')">🗑️</button>`;
                }
            });
        }

        function filterTable() { renderTable(); }
        function toggleSelectAll() { document.querySelectorAll('.order-checkbox').forEach(cb => cb.checked = document.getElementById('selectAll').checked); }

        async function hapusOrder(orderId) {
            if(!confirm('Hapus order ini?')) return;
            await fetch('/api/admin/delete-order', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ order_id: orderId }) });
            fetchOrders();
        }

        async function hapusTerpilih() {
            const ids = [...document.querySelectorAll('.order-checkbox:checked')].map(cb => cb.value);
            if(ids.length === 0) return;
            if(confirm(`Hapus ${ids.length} order?`)) {
                for(let id of ids) await fetch('/api/admin/delete-order', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ order_id: id }) });
                fetchOrders();
            }
        }

        async function hapusSemuaCompleted() {
            const completed = ordersData.filter(o => o.status === 'completed');
            if(completed.length === 0) return alert('Tidak ada order completed');
            if(confirm(`Hapus ${completed.length} order completed?`)) {
                for(let order of completed) await fetch('/api/admin/delete-order', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ order_id: order.order_id }) });
                fetchOrders();
            }
        }

        async function prosesTopup(orderId, userId, productName) {
            if(!confirm(`Kirim ${productName} ke ID: ${userId}?`)) return;
            showToast('⏳ Mengirim diamond...');
            try {
                const res = await fetch('/api/admin/process-topup', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ order_id: orderId }) });
                const data = await res.json();
                if(data.success) { showToast('✅ ' + data.message); fetchOrders(); }
                else { showToast('❌ ' + data.message); }
            } catch(e) { showToast('❌ Error: ' + e.message); }
        }

        function showToast(msg) { const toast = document.getElementById('toastMsg'); toast.innerText = msg; toast.style.display = 'block'; setTimeout(() => toast.style.display = 'none', 3000); }

        setInterval(fetchOrders, 10000);
        fetchOrders();
    </script>
</body>
</html>
