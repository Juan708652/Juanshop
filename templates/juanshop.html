<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JUANSHOP - Topup Diamond FF</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            color: white;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 550px;
            margin: auto;
            background: rgba(0,0,0,0.6);
            border-radius: 24px;
            padding: 20px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0,255,136,0.3);
        }
        h1 {
            text-align: center;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub {
            text-align: center;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 20px;
        }
        .form-group { margin-bottom: 15px; }
        .form-group input {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }
        .payment-section {
            margin: 20px 0;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 15px;
        }
        .payment-title {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 12px;
            border-left: 3px solid #00ff88;
            padding-left: 10px;
        }
        .payment-options {
            display: flex;
            gap: 12px;
        }
        .payment-option {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .payment-option.selected {
            background: #00ff88;
            color: black;
            border-color: #00ff88;
        }
        .payment-option-icon { font-size: 28px; }
        .payment-option-name { font-weight: bold; font-size: 14px; }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }
        .product-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }
        .product-card:hover {
            background: rgba(0,255,136,0.15);
            transform: scale(1.02);
        }
        .product-name { font-size: 13px; font-weight: bold; }
        .product-price { color: #00ff88; font-weight: bold; font-size: 14px; margin-top: 5px; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 25px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            border: 1px solid #00ff88;
        }
        .modal-content h3 { color: #00ff88; }
        .detail { background: rgba(0,255,136,0.1); padding: 12px; border-radius: 12px; margin: 15px 0; text-align: left; }
        .detail p { margin: 5px 0; font-size: 14px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .modal-buttons button { flex: 1; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; }
        .btn-yes { background: #00ff88; color: black; }
        .btn-no { background: #ff4444; color: white; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #00ff88;
            color: black;
            padding: 12px;
            border-radius: 12px;
            display: none;
            z-index: 999;
        }
        .footer { text-align: center; font-size: 10px; color: #555; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>JUANSHOP</h1>
        <div class="sub">Topup Diamond Free Fire</div>

        <div class="form-group">
            <input type="text" id="customerName" placeholder="Nama kamu">
        </div>
        <div class="form-group">
            <input type="tel" id="customerPhone" placeholder="Nomor WhatsApp (WAJIB)">
        </div>
        <div class="form-group">
            <input type="text" id="customerId" placeholder="User ID Game (WAJIB)">
        </div>

        <div class="payment-section">
            <div class="payment-title">Metode Pembayaran</div>
            <div class="payment-options">
                <div class="payment-option selected" data-payment="dana" onclick="selectPayment('dana')">
                    <div class="payment-option-icon">💙</div>
                    <div class="payment-option-name">DANA</div>
                </div>
                <div class="payment-option" data-payment="cash" onclick="selectPayment('cash')">
                    <div class="payment-option-icon">💰</div>
                    <div class="payment-option-name">CASH</div>
                </div>
            </div>
        </div>

        <div id="productList" class="product-grid"></div>
        <div class="footer">Order akan dikonfirmasi via Telegram</div>
    </div>

    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <h3>⚠️ KONFIRMASI PEMBELIAN</h3>
            <div id="modalDetail" class="detail"></div>
            <div class="modal-buttons">
                <button class="btn-yes" id="confirmYes">✅ YA, LANJUTKAN</button>
                <button class="btn-no" id="confirmNo">❌ BATAL</button>
            </div>
        </div>
    </div>

    <div id="toastMsg" class="toast"></div>

    <script>
        const produk = {{ products | tojson }};
        const danaNumber = {{ dana_number | tojson }};
        let selectedPayment = 'dana';
        let pendingOrder = null;

        function bulatkanHargaCash(harga) {
            if(harga <= 1000) return 2000;
            return Math.ceil(harga / 1000) * 1000;
        }

        function getFinalPrice(originalPrice) {
            let price = originalPrice;
            if(selectedPayment === 'cash') {
                price = bulatkanHargaCash(price);
            }
            return price;
        }

        function selectPayment(payment) {
            selectedPayment = payment;
            document.querySelectorAll('.payment-option').forEach(opt => {
                opt.classList.remove('selected');
                if(opt.getAttribute('data-payment') === payment) {
                    opt.classList.add('selected');
                }
            });
            displayProducts();
        }

        function displayProducts() {
            const container = document.getElementById('productList');
            container.innerHTML = '';
            for(let code in produk) {
                const p = produk[code];
                const finalPrice = getFinalPrice(p.price);
                const hasDiscount = finalPrice !== p.price;
                container.innerHTML += `
                    <div class="product-card" onclick="showConfirmModal('${code}', '${p.name}', ${p.price}, ${finalPrice})">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">Rp ${finalPrice.toLocaleString()}</div>
                        ${hasDiscount ? `<div style="font-size:11px; text-decoration:line-through; color:#888;">Rp ${p.price.toLocaleString()}</div>` : ''}
                    </div>
                `;
            }
        }

        function showConfirmModal(code, name, originalPrice, finalPrice) {
            const customerName = document.getElementById('customerName').value;
            const customerPhone = document.getElementById('customerPhone').value;
            const customerId = document.getElementById('customerId').value;

            if(!customerPhone) { showToast('Masukkan nomor WhatsApp!'); return; }
            if(!customerId) { showToast('Masukkan User ID game!'); return; }

            pendingOrder = { code, name, originalPrice, finalPrice, customerName, customerPhone, customerId, payment: selectedPayment };

            const modalDetail = document.getElementById('modalDetail');
            modalDetail.innerHTML = `
                <p><strong>💎 Produk:</strong> ${name}</p>
                <p><strong>💰 Harga:</strong> Rp ${finalPrice.toLocaleString()}</p>
                ${finalPrice !== originalPrice ? `<p><strong>💸 Harga asli:</strong> Rp ${originalPrice.toLocaleString()} (dibulatkan untuk Cash)</p>` : ''}
                <p><strong>📱 WA:</strong> ${customerPhone}</p>
                <p><strong>🆔 User ID:</strong> ${customerId}</p>
                <p><strong>💳 Metode:</strong> ${selectedPayment === 'dana' ? 'DANA' : 'CASH'}</p>
                <hr><p style="color:#ffaa00;">⚠️ Pastikan data sudah benar!</p>
            `;
            document.getElementById('confirmModal').style.display = 'flex';
        }

        async function prosesOrder() {
            if(!pendingOrder) return;
            showToast('Memproses order...');
            try {
                const res = await fetch('/api/create-order', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        customer_name: pendingOrder.customerName,
                        customer_phone: pendingOrder.customerPhone,
                        customer_id: pendingOrder.customerId,
                        product_code: pendingOrder.code,
                        metode: pendingOrder.payment,
                        final_price: pendingOrder.finalPrice
                    })
                });
                const data = await res.json();
                if(data.success) {
                    showToast(`✅ Order ${data.order_id} berhasil!`);
                    alert(`✅ ORDER BERHASIL!\n\nORDER ID: ${data.order_id}\nTransfer ke DANA: ${data.dana_number}\nCatatan: ORDER ${data.order_id}`);
                    document.getElementById('confirmModal').style.display = 'none';
                    pendingOrder = null;
                    if(pendingOrder?.payment === 'dana') {
                        setTimeout(() => window.location.href = "dana://", 1500);
                    }
                } else {
                    showToast('❌ Gagal: ' + data.message);
                }
            } catch(e) {
                showToast('❌ Error: ' + e.message);
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toastMsg');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        document.getElementById('confirmYes').addEventListener('click', prosesOrder);
        document.getElementById('confirmNo').addEventListener('click', () => {
            document.getElementById('confirmModal').style.display = 'none';
            pendingOrder = null;
        });
        window.addEventListener('click', (e) => {
            if (e.target === document.getElementById('confirmModal')) {
                document.getElementById('confirmModal').style.display = 'none';
                pendingOrder = null;
            }
        });

        displayProducts();
    </script>
</body>
</html>
